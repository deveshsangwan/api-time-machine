packages:
  - apps/*
  - packages/*

onlyBuiltDependencies:
  - esbuild
allowBuilds:
  esbuild: true

confirmModulesPurge: false

# Reviewed, lockfile-pinned Codex release used by the hackathon evaluation.
# Keep the default 24-hour release-age protection for every other package.
minimumReleaseAgeExclude:
  - '@openai/codex-sdk@0.144.4'
  - '@openai/codex@0.144.4 || 0.144.4-darwin-arm64 || 0.144.4-darwin-x64 || 0.144.4-linux-arm64 || 0.144.4-linux-x64 || 0.144.4-win32-arm64 || 0.144.4-win32-x64'
